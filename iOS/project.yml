name: Looprow
options:
  bundleIdPrefix: com.shimondeitel.crochetlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Looprow:
    type: application
    platform: iOS
    sources:
      - path: Looprow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.crochetlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Looprow/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LooprowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LooprowTests
      - path: Looprow.storekit
    dependencies:
      - target: Looprow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.crochetlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LooprowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LooprowUITests
    dependencies:
      - target: Looprow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.crochetlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Looprow:
    build:
      targets:
        Looprow: all
        LooprowTests: [test]
        LooprowUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Looprow.storekit
    test:
      config: Debug
      storeKitConfiguration: Looprow.storekit
      targets:
        - LooprowTests
        - LooprowUITests
    archive:
      config: Release
